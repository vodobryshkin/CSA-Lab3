limit: 400
memory_size: 0x400

memory_mapped_io:
  0x80: [0x84C24321]
  0x84: []

reports:
  - name: step-by-step
    slice: all
    view: |
      PC={pc:hex} Acc={Acc:hex} Instruction={instruction} {pc:label}

  - name: result
    slice: last
    view: |
      numio[0x80]: {io:0x80:hex}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [1]